services:

  mongodb:
    image: mongo:7
    container_name: portfolio-mongodb
    restart: unless-stopped
    env_file:
      - ./portfolio/.env.docker
    volumes:
      - mongodb_data:/data/db
    networks:
      - internal

  qdrant:
    image: qdrant/qdrant:latest
    container_name: portfolio-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - internal

  ai_backend:
    build:
      context: ./ai_backend
    container_name: portfolio-ai-backend
    restart: unless-stopped
    env_file:
      - ./ai_backend/.env.docker
    environment:
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - qdrant
    networks:
      - internal

  web_1:
    build:
      context: ./portfolio
      args:
        MONGODB_URI: mongodb://portfolio_user:portfolio_pass@mongodb:27017/portfolio?authSource=admin
        AI_BACKEND_URL: http://ai_backend:8000
        NEXTAUTH_SECRET: your-secret-key-change-this-in-production
        NEXTAUTH_URL: http://43.204.214.45
    image: portfolio-frontend:latest
    container_name: portfolio-web-1
    restart: unless-stopped
    env_file:
      - ./portfolio/.env.docker
    ports:
      - "5010:3000"
    depends_on:
      - mongodb
      - ai_backend
    networks:
      - internal
      - external

  web_2:
    image: portfolio-frontend:latest
    container_name: portfolio-web-2
    restart: unless-stopped
    env_file:
      - ./portfolio/.env.docker
    ports:
      - "5011:3000"
    depends_on:
      - mongodb
      - ai_backend
    networks:
      - internal
      - external

  web_3:
    image: portfolio-frontend:latest
    container_name: portfolio-web-3
    restart: unless-stopped
    env_file:
      - ./portfolio/.env.docker
    ports:
      - "5012:3000"
    depends_on:
      - mongodb
      - ai_backend
    networks:
      - internal
      - external

networks:
  internal:
  external:

volumes:
  mongodb_data:
  qdrant_storage: